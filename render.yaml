services:
  - type: web_service
    name: petfeeder-backend
    env: python
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn petfeeder.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: DJANGO_SECRET_KEY
        generator: secret
staticSites:
  - name: feederapp-static-site
    branch: main
    buildCommand: ""
    publishPath: feederapp
